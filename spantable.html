<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>row span and column span</title>
</head>
<body>
     <table border="1" width="40%">
        <caption align="center"> <b> Practice Table </b></caption>
        <tr>
           <td colspan="4" style="padding: 10px;"> 1 </td>
        </tr> 

         <tr>
           <td rowspan="2" colspan="4" style="padding: 10px;"> 1 </td>
           <td colspan="4" style="padding: 10px;"> 2</td>
           <td colspan="4" style="padding: 10px;"> 3 </td>
           <td rowspan="2" colspan="4" style="padding: 10px;"> 4 </td>
        </tr> 

        <tr>
           <td colspan="4" style="padding: 10px;"> 2 </td>
           <td colspan="4" style="padding: 10px;"> 3 </td>
        </tr>

        <tr>
           <td colspan="4" style="padding: 10px;"> 1 </td>
        </tr> 

    </table>
</body>
</html>
