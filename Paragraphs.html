<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
</head>
<body>
    <!--Case 1-->
    <p> Hello </p>
    <P> Hii </P>
    <!--Case 2-->
    <P>Hello</P> <p>Hii</p>
    <!--Case 3-->
    <p> Hello Hii </p>
    <!--Case 4-->
    <!--<br> break tag displays the output in new line-->
    <P> Hello <br>
        Hii !
    </P>
    <!--preformated tag-->
    <pre>
        Hello 
        
                    H  ii ! 
    </pre>
</body>
</html>
