<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div Tags</title>
</head>
<body>
    <center><h1>Heading</h1></center>
    <h1 style="text-align: center;">Another Heading</h1>
    <!-- Block level element - div, pre, p, h1-h6 -->
    <div>Hello</div>
    <div>Hii</div>
    <p>hello</p>
    <p>Hii</p>
    <!--Inline level element -span, b, a, img, sub, sup -->
    <span>Hello</span>
    <span>Hii</span>

    <p> Feb batch students are very <span style="color: red;">Knowledgeable</span></p>
</body>
</html>
